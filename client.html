<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IDG-Suite Tool Tester</title>
    <style>
        body { font-family: monospace; background-color: #121212; color: #00ff00; padding: 20px; }
        .container { max-width: 800px; margin: auto; border: 1px solid #00ff00; padding: 20px; box-shadow: 0 0 10px #00ff00; }
        h1 { text-align: center; border-bottom: 1px solid #00ff00; padding-bottom: 10px; }
        select, input, textarea, button { 
            width: 100%; padding: 10px; margin: 10px 0; 
            background: #000; border: 1px solid #00ff00; color: #00ff00; box-sizing: border-box;
        }
        button:hover { background: #00ff00; color: #000; cursor: pointer; }
        #response-area { 
            background: #000; border: 1px solid #00ff00; padding: 10px; 
            min-height: 200px; white-space: pre-wrap; overflow-x: auto;
        }
        .param-group { border-left: 3px solid #00ff00; padding-left: 15px; margin-bottom: 20px; }
        label { font-weight: bold; display: block; margin-top: 10px; }
    </style>
</head>
<body>

<div class="container">
    <h1>IDG-Suite Terminal</h1>
    
    <label for="tool-select">Select Tool:</label>
    <select id="tool-select" onchange="updateFields()">
        <option value="">-- Select a Tool --</option>
        <option value="calculator">calculator</option>
        <option value="convert">convert</option>
        <option value="distance">distance</option>
        <option value="file_manager">file_manager</option>
        <option value="get_location_info">get_location_info</option>
        <option value="notes">notes</option>
        <option value="run_command">run_command</option>
        <option value="time_utils">time_utils</option>
        <option value="weather">weather</option>
        <option value="web_page">web_page</option>
        <option value="web_search">web_search</option>
    </select>

    <div id="input-fields"></div>

    <button onclick="executeTool()">EXECUTE</button>

    <h3>Output:</h3>
    <div id="response-area">Ready for input...</div>
</div>

<script>
    let toolConfigs = {};

    async function initTerminal() {
        const responseArea = document.getElementById('response-area');
        try {
            // Fetch the discovery data from the root endpoint
            const response = await fetch('http://localhost:8080/');
            const data = await response.json();
            
            const select = document.getElementById('tool-select');
            select.innerHTML = '<option value="">-- Select a Tool --</option>';
            
            data.available_tools.forEach(toolWrap => {
                const tool = toolWrap.function;
                const name = tool.name;
                
                // Map the OpenAI-style params back to our simple UI config
                toolConfigs[name] = {};
                for (const [pName, pValue] of Object.entries(tool.parameters.properties)) {
                    // Use 'json' as a hint if it's an object/string but meant for location
                    let type = pValue.type;
                    if (pName.includes('location')) type = 'json';
                    toolConfigs[name][pName] = type;
                }

                // Populate the dropdown
                const opt = document.createElement('option');
                opt.value = name;
                opt.innerText = name;
                select.appendChild(opt);
            });

            responseArea.innerText = 'Terminal Ready. ' + data.available_tools.length + ' tools discovered.';
        } catch (error) {
            responseArea.innerText = 'DISCOVERY ERROR: Ensure tool_server.py is running on port 8080.\n' + error.message;
        }
    }

    function updateFields() {
        const tool = document.getElementById('tool-select').value;
        const container = document.getElementById('input-fields');
        container.innerHTML = '';
        
        if (!tool || !toolConfigs[tool]) return;

        for (const [key, type] of Object.entries(toolConfigs[tool])) {
            const label = document.createElement('label');
            label.innerText = key.toUpperCase() + (type === 'json' ? ' (JSON format)' : '');
            
            let input;
            if (type === 'boolean') {
                input = document.createElement('select');
                input.innerHTML = '<option value="false">false</option><option value="true">true</option>';
            } else if (type === 'json' || type === 'object') {
                input = document.createElement('textarea');
                input.placeholder = '{"latitude": 0.0, "longitude": 0.0}';
                input.rows = 3;
            } else {
                input = document.createElement('input');
                input.type = (type === 'integer' || type === 'number') ? 'number' : 'text';
            }
            
            input.id = 'param-' + key;
            input.className = 'tool-param';
            container.appendChild(label);
            container.appendChild(input);
        }
    }

    async function executeTool() {
        const tool = document.getElementById('tool-select').value;
        const responseArea = document.getElementById('response-area');
        if (!tool) return;

        const payload = {};
        const inputs = document.querySelectorAll('.tool-param');
        
        inputs.forEach(input => {
            const key = input.id.replace('param-', '');
            let value = input.value;

            if (input.type === 'number') value = parseFloat(value);
            if (input.tagName === 'SELECT' && (value === 'true' || value === 'false')) value = (value === 'true');
            if (input.tagName === 'TEXTAREA') {
                try { value = JSON.parse(value); } catch(e) { /* keep as string if not valid JSON */ }
            }

            if (value !== "" && value !== undefined) payload[key] = value;
        });

        responseArea.innerText = 'Executing ' + tool + '...';

        try {
            const response = await fetch('http://localhost:8080/tool/' + tool, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
            });
            const data = await response.json();
            responseArea.innerText = JSON.stringify(data, null, 2);
        } catch (error) {
            responseArea.innerText = 'Error: ' + error.message;
        }
    }

    // Run discovery on page load
    window.onload = initTerminal;
</script>

</body>
</html>
